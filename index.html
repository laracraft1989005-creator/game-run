<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市跑酷 City Runner</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="game-container">
        <!-- 加载画面 -->
        <div id="loading" class="overlay">
            <h2 class="loading-title">CITY RUNNER</h2>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p class="loading-text">Loading city assets...</p>
        </div>

        <!-- 主菜单 -->
        <div id="menu" class="overlay hidden">
            <h1>城市跑酷</h1>
            <p class="subtitle">CITY RUNNER</p>
            <button id="btn-start" class="btn">开始游戏</button>
            <p class="controls-hint">
                ← → 切换车道 &nbsp;|&nbsp; ↑ / 空格 跳跃 &nbsp;|&nbsp; ↓ 滑铲<br>
                手机: 左右滑动切换 · 上滑跳跃 · 下滑滑铲
            </p>
        </div>

        <!-- 倒计时 -->
        <div id="countdown" class="overlay hidden">
            <span class="countdown-number"></span>
        </div>

        <!-- HUD -->
        <div id="hud" class="overlay hidden">
            <div class="hud-top">
                <div class="hud-score"><span id="score">0</span></div>
                <div class="hud-distance"><span id="distance">0m</span></div>
            </div>
            <button id="btn-mute" class="mute-btn">🔊</button>
            <div id="milestone-popup" class="milestone-popup hidden"></div>
        </div>

        <!-- 结算 -->
        <div id="gameover" class="overlay hidden">
            <div class="gameover-panel">
                <h2>游戏结束</h2>
                <p class="score-display">得分: <span id="final-score">0</span></p>
                <p class="score-display">最高: <span id="high-score">0</span>
                    <span id="new-record" class="new-record hidden">NEW RECORD!</span>
                </p>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">距离</span>
                        <span id="stat-distance" class="stat-value">0m</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">时间</span>
                        <span id="stat-time" class="stat-value">0s</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">最高速度</span>
                        <span id="stat-speed" class="stat-value">0</span>
                    </div>
                </div>
                <button id="btn-restart" class="btn">再来一局</button>
            </div>
        </div>
    </div>

    <script>
        window.onerror = function(msg, src, line, col, err) {
            var d = document.getElementById('debug-log');
            if (d) d.textContent += '[ERR] ' + msg + ' @ ' + src + ':' + line + '\n';
            console.error(msg, src, line);
        };
        window.addEventListener('unhandledrejection', function(e) {
            var d = document.getElementById('debug-log');
            if (d) d.textContent += '[REJECT] ' + e.reason + '\n';
        });
    </script>
    <pre id="debug-log" style="position:fixed;bottom:0;left:0;color:lime;background:rgba(0,0,0,0.8);font-size:12px;padding:8px;max-height:200px;overflow:auto;z-index:9999;pointer-events:none;"></pre>
    <script type="module" src="main.js"></script>
</body>
</html>
